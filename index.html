<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#06111f">
    <title>DuoFin v2</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="app-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css?v=20">
  </head>
  <body class="locked" data-view="home">
    <section id="auth" class="auth-screen"></section>

    <main id="app" class="app-shell">
      <header class="app-head">
        <div class="brand-row">
          <img class="brand-logo" src="app-icon.svg" alt="DuoFin">
          <div>
            <strong>DuoFin</strong>
            <small>Controle compartilhado</small>
          </div>
          <button id="settings-open" class="icon-button" type="button" aria-label="Ocultar valores">Ver</button>
        </div>
        <div class="period-row">
          <label>
            <span>Mes</span>
            <select id="month-select"></select>
          </label>
          <label>
            <span>Ano</span>
            <select id="year-select"></select>
          </label>
        </div>
      </header>

      <section id="home" class="view active"></section>
      <section id="launch" class="view"></section>
      <section id="cards" class="view"></section>
      <section id="fixed" class="view"></section>
      <section id="statement" class="view"></section>
      <section id="settings" class="view"></section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-go="home" type="button"><b>In</b><span>Inicio</span></button>
      <button class="nav-item" data-go="launch" type="button"><b>+</b><span>Lancar</span></button>
      <button class="nav-item" data-go="cards" type="button"><b>CC</b><span>Cartoes</span></button>
      <button class="nav-item" data-go="fixed" type="button"><b>Fx</b><span>Fixos</span></button>
      <button class="nav-item" data-go="statement" type="button"><b>Ex</b><span>Extrato</span></button>
      <button class="nav-item" data-go="settings" type="button"><b>...</b><span>Mais</span></button>
    </nav>

    <div id="toast" class="toast" hidden></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js?v=20"></script>
  </body>
</html>
